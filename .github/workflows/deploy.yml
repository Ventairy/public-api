name: Deploy

on:
  push:
    branches: [main, staging]

jobs:
  resolve-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
    steps:
      - name: Resolve target environment
        id: resolve
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          fi

  check-code-quality:
    needs: resolve-environment
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bun-version: ["1"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check migrations in sync
        run: bun run db:generate && git diff --exit-code src/db/migrations/

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test:cov

      - name: Worker tests
        run: bun run test:worker

      - name: Build
        run: bun run build

  migrate-database:
    needs: [resolve-environment, check-code-quality]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-environment.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy D1 migrations
        run: bun run db:deploy
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          CF_D1_API_TOKEN: ${{ secrets.CF_D1_API_TOKEN }}

  deploy-container:
    needs: [resolve-environment, check-code-quality, migrate-database]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-environment.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate secrets file
        run: |
          cat > .secrets.env <<EOF
          CF_ACCOUNT_ID=${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DATABASE_ID=${{ secrets.CF_D1_DATABASE_ID }}
          CF_D1_API_TOKEN=${{ secrets.CF_D1_API_TOKEN }}
          EOF

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_DEPLOY_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          packageManager: npm
          wranglerVersion: "4"
          command: deploy --env ${{ needs.resolve-environment.outputs.environment }} --secrets-file .secrets.env
        env:
          NODE_ENV: ${{ needs.resolve-environment.outputs.environment }}
