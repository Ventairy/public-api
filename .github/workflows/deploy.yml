name: Deploy

on:
  workflow_run:
    workflows: [Check Code Quality]
    types: [completed]
    branches: [main, staging]

jobs:
  resolve-environment:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      deploy: ${{ steps.resolve.outputs.deploy }}
    steps:
      - name: Resolve target environment
        id: resolve
        run: |
          if [ "${{ github.event.workflow_run.head_branch }}" = "main" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.workflow_run.head_branch }}" = "staging" ]; then
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "environment=" >> "$GITHUB_OUTPUT"
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

  migrate-database:
    needs: resolve-environment
    if: ${{ needs.resolve-environment.outputs.deploy == 'true' }}
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-environment.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy D1 migrations
        run: bun run db:deploy
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          CF_D1_API_TOKEN: ${{ secrets.CF_D1_API_TOKEN }}

  deploy-container:
    needs: [resolve-environment, migrate-database]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-environment.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set Cloudflare secrets
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          CF_D1_API_TOKEN: ${{ secrets.CF_D1_API_TOKEN }}
          BLINDPAY_API_KEY: ${{ secrets.BLINDPAY_API_KEY }}
          WRANGLER_ENV: ${{ needs.resolve-environment.outputs.environment }}
        run: |
          for secret_name in CF_ACCOUNT_ID CF_D1_DATABASE_ID CF_D1_API_TOKEN BLINDPAY_API_KEY; do
            secret_value="${!secret_name}"
            echo "Setting secret: ${secret_name}"
            echo "${secret_value}" | npx wrangler secret put "${secret_name}" --env "${WRANGLER_ENV}"
          done

      - name: Deploy to Cloudflare
        run: npx wrangler deploy --env ${{ needs.resolve-environment.outputs.environment }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
